<!DOCTYPE html>

<html lang="">
<!-- To declare your language - read more here: https://www.w3.org/International/questions/qa-html-language-declarations -->
<head>
  <title>Alzheimer's Disease Prediction</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="{% static 'layout/styles/layout.css' %}" rel="stylesheet" type="text/css" media="all">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      color: #fff;
      background: #000;
    }

    .bgded.overlay {
      min-height: 100vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    h3.heading {
      font-size: 30px;
      margin-bottom: 20px;
      text-align: center;
      color: #fff;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.6);
    }

    p {
      font-size: 16px;
      margin-bottom: 30px;
      color: #eaeaea;
      text-align: center;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .input100 {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: background 0.3s;
    }

    .input100::placeholder {
      color: #ccc;
    }

    .input100:focus {
      background: rgba(255,255,255,0.3);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      background-color: #ff4c4c;
      border: none;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .btn:hover {
      background-color: #e60000;
    }

    footer {
      margin-top: 20px;
    }

    @media screen and (max-width: 600px) {
      .glass-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body id="top">

<div class="bgded overlay" style="background-image: url('{% static 'images/demo/backgrounds/2345.jpg' %}');">
  <div class="glass-card">
    <h3 class="heading">Alzheimer Disease Prediction using Deep Learning</h3>
    <p>
      Alzheimer's disease is a leading cause of death among older adults. Early prediction using AI can aid in effective care and diagnosis.
    </p>

    <form action="{% url 'input' %}" method="POST" enctype="multipart/form-data" class="login100-form validate-form">
      {% csrf_token %}
      <div class="form-group">
        <input class="input100" type="text" name="name" placeholder="Enter your name">
      </div>
      <div class="form-group">
        <input class="input100" type="password" name="password" placeholder="Enter your password">
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
  </div>
</div>

<a id="backtotop" href="#top"><i class="fas fa-chevron-up"></i></a>

<!-- JAVASCRIPTS -->
<script src="{% static 'layout/scripts/jquery.min.js' %}"></script>
<script src="{% static 'layout/scripts/jquery.backtotop.js' %}"></script>
<script src="{% static 'layout/scripts/jquery.mobilemenu.js' %}"></script>

</body>
</html>
